        <!-- Interview info (if scheduled) -->
        <div v-if="a.status==='interview_scheduled' && a.interview_slot" class="mx-3 mb-2">
          <div class="alert alert-primary py-3 mb-0">
            <div class="d-flex align-items-start gap-3">
              <i class="bi bi-camera-video fs-4 mt-1"></i>
              <div class="flex-grow-1">
                <div class="fw-semibold mb-1">Interview Scheduled</div>
                <div class="small mb-1">
                  <i class="bi bi-clock me-1"></i>
                  <strong>{{fmtDateTime(a.interview_slot.slot_datetime)}}</strong>
                </div>
                <span class="badge" :class="a.interview_slot.mode==='online'?'bg-primary':'bg-secondary'">
                  {{a.interview_slot.mode}}
                </span>
                <div v-if="a.interview_slot.venue_or_link" class="mt-2">
                  <div v-if="a.interview_slot.mode==='online'">
                    <a :href="a.interview_slot.venue_or_link"
                      target="_blank" class="btn btn-sm btn-primary">
                      <i class="bi bi-camera-video me-2"></i>Join Meeting Now
                    </a>
                    <div class="small text-muted mt-1 text-break">{{a.interview_slot.venue_or_link}}</div>
                  </div>
                  <div v-else class="small mt-1">
                    <i class="bi bi-building me-1"></i>Venue: <strong>{{a.interview_slot.venue_or_link}}</strong>
                  </div>
                </div>
                <div v-else class="small mt-2">
                  <span v-if="new Date(a.interview_slot.slot_datetime) < new Date()"
                    class="text-danger fw-semibold">
                    <i class="bi bi-clock-history me-1"></i>⏱ Meeting time has passed — link expired.
                  </span>
                  <span v-else class="text-muted">
                    <i class="bi bi-hourglass-split me-1"></i>Meeting link / venue will be shared by the recruiter soon.
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
